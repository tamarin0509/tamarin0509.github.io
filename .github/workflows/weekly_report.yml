name: Weekly Report

on:
  schedule:
    # 毎週金曜 UTC 22:00 (日本時間 土曜 朝 7:00) に実行
    # 日次スクリーナー (21:00 UTC) の後、その週の締めとして予測記録と答え合わせを行う
    - cron: '0 22 * * 5'
  workflow_dispatch: # 手動実行にも対応

permissions:
  contents: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 最新データでレポートを作るため、スクリーナーを先に実行
      - name: Run Screener Script
        run: node scripts/screener.js

      - name: Run Weekly Report Script
        run: node scripts/weekly_report.js

      - name: Commit and Push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add screener_results.json data blog
          if ! git diff --cached --quiet; then
            git commit -m "chore: weekly report update [skip ci]"
            git push origin main
          else
            echo "No changes."
          fi
